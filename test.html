<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Exam Management - Test Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .form-container {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f5f5f5;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .result pre {
            background: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .button-text {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 University Exam Management</h1>
            <p>Register a new user account</p>
        </div>
        
        <div class="form-container">
            <form id="registerForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="name" placeholder="Enter first name" required>
                </div>
                
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="prenom" placeholder="Enter last name" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="admin">Admin</option>
                        <option value="professeur">Professor</option>
                        <option value="etudiant">Student</option>
                    </select>
                </div>
                
                <button type="submit">
                    <span class="button-text">Register User</span>
                </button>
            </form>
            
            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const button = document.querySelector('button');
            const originalText = button.innerHTML;
            button.innerHTML = '<span class="button-text"><span class="loading"></span> Registering...</span>';
            button.disabled = true;
            
            const data = {
                name: document.getElementById('name').value,
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show';
            resultDiv.innerHTML = '<p>📡 Sending request to server...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result show success';
                    resultDiv.innerHTML = `
                        <strong>✅ Registration Successful!</strong>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                        <p>🎉 User created successfully! Save this token for future API requests.</p>
                    `;
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                } else {
                    resultDiv.className = 'result show error';
                    resultDiv.innerHTML = `
                        <strong>❌ Registration Failed!</strong>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                        <p>${result.message || 'Please check your input and try again.'}</p>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result show error';
                resultDiv.innerHTML = `
                    <strong>❌ Connection Error!</strong>
                    <p>Cannot connect to the server. Make sure:</p>
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        <li>Backend server is running (npm run dev)</li>
                        <li>Server is running on port 5000</li>
                        <li>MongoDB is connected</li>
                    </ul>
                    <p style="margin-top: 10px;"><strong>Error:</strong> ${error.message}</p>
                `;
            } finally {
                button.innerHTML = originalText;
                button.disabled = false;
            }
        };
    </script>
</body>
</html>
